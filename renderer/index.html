<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPN Client</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- ─── CUSTOM TITLE BAR ──────────────────────────────────────── -->
    <div class="titlebar" id="titlebar">
        <div class="titlebar-drag">
            <div class="titlebar-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                    <path d="M12 22C6.477 22 2 17.523 2 12S6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z" stroke="url(#g1)" stroke-width="2"/>
                    <path d="M12 6v12M6 12h12" stroke="url(#g1)" stroke-width="2" stroke-linecap="round"/>
                    <defs><linearGradient id="g1" x1="2" y1="2" x2="22" y2="22"><stop stop-color="#6366f1"/><stop offset="1" stop-color="#a855f7"/></linearGradient></defs>
                </svg>
            </div>
            <span class="titlebar-title">VPN Client</span>
        </div>
        <div class="titlebar-controls">
            <button class="titlebar-btn" id="btn-minimize" title="Küçült">
                <svg width="12" height="12" viewBox="0 0 12 12"><rect y="5" width="12" height="2" rx="1" fill="currentColor"/></svg>
            </button>
            <button class="titlebar-btn close" id="btn-close" title="Kapat">
                <svg width="12" height="12" viewBox="0 0 12 12"><path d="M2 2l8 8M10 2l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            </button>
        </div>
    </div>

    <!-- ─── LOADING SCREEN ────────────────────────────────────────── -->
    <div class="screen" id="screen-loading">
        <div class="loading-container">
            <div class="loading-spinner"></div>
            <p class="loading-text">Yükleniyor...</p>
        </div>
    </div>

    <!-- ─── LOGIN SCREEN ──────────────────────────────────────────── -->
    <div class="screen hidden" id="screen-login">
        <div class="login-container">
            <div class="login-logo">
                <div class="logo-ring">
                    <svg width="72" height="72" viewBox="0 0 72 72" fill="none">
                        <circle cx="36" cy="36" r="32" stroke="url(#lg)" stroke-width="3" stroke-dasharray="6 4"/>
                        <path d="M36 20v32M20 36h32" stroke="url(#lg)" stroke-width="3" stroke-linecap="round"/>
                        <defs><linearGradient id="lg" x1="4" y1="4" x2="68" y2="68"><stop stop-color="#6366f1"/><stop offset="1" stop-color="#a855f7"/></linearGradient></defs>
                    </svg>
                </div>
            </div>
            <h1 class="login-title">VPN Client</h1>
            <p class="login-subtitle">Güvenli internet erişimi</p>



            <button class="btn-google" id="btn-google-login">
                <svg width="20" height="20" viewBox="0 0 48 48">
                    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                    <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                </svg>
                Google ile Giriş Yap
            </button>

            <p class="login-footer">Google hesabınız ile güvenle giriş yapın</p>
        </div>
    </div>

    <!-- ─── MAIN SCREEN ───────────────────────────────────────────── -->
    <div class="screen hidden" id="screen-main">
        <!-- User Info Bar -->
        <div class="user-bar">
            <div class="user-info">
                <div class="user-avatar" id="user-avatar">U</div>
                <div class="user-details">
                    <span class="user-email" id="user-email">user@email.com</span>
                    <span class="user-status" id="user-status">Aktif</span>
                </div>
            </div>
            <button class="btn-icon-sm" id="btn-settings" title="Ayarlar">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>
            </button>
        </div>

        <!-- Connect Button -->
        <div class="connect-section">
            <div class="connect-ring" id="connect-ring">
                <button class="connect-btn" id="btn-connect">
                    <svg class="connect-icon" id="connect-icon" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <polygon points="5 3 19 12 5 21 5 3"/>
                    </svg>
                </button>
            </div>
            <p class="connect-label" id="connect-label">Bağlanmak için dokunun</p>
        </div>

        <!-- Protocol Selector -->
        <div class="protocol-section">
            <label class="section-label">Protokol Seçimi</label>
            <div class="custom-dropdown" id="custom-protocol-dropdown">
                <div class="dropdown-header" id="dropdown-header">
                    <span id="dropdown-selected-text">Seçiliyor...</span>
                    <svg class="dropdown-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
                </div>
                <div class="dropdown-list-wrapper">
                    <ul class="dropdown-list" id="dropdown-options">
                        <!-- Options injected by JS -->
                    </ul>
                </div>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-section">
            <div class="stat-card" id="card-usage">
                <div class="stat-header">
                    <div class="stat-icon">📊</div>
                    <div class="stat-info">
                        <span class="stat-label">Kullanım</span>
                        <span class="stat-value" id="stat-usage">0 B</span>
                    </div>
                </div>
                <div class="stat-progress-container">
                    <div class="stat-progress-bar" id="progress-usage" style="--progress: 0%"></div>
                </div>
            </div>
            
            <div class="stat-card">
                <div class="stat-header">
                    <div class="stat-icon">📦</div>
                    <div class="stat-info">
                        <span class="stat-label">Limit</span>
                        <span class="stat-value" id="stat-limit">Sınırsız</span>
                    </div>
                </div>
                <div class="stat-progress-container hidden" id="container-limit">
                    <div class="stat-progress-bar" id="progress-limit" style="--progress: 100%"></div>
                </div>
            </div>

            <div class="stat-card" id="card-expiry">
                <div class="stat-header">
                    <div class="stat-icon">⏱️</div>
                    <div class="stat-info">
                        <span class="stat-label">Süre</span>
                        <span class="stat-value" id="stat-expiry">Sınırsız</span>
                    </div>
                </div>
                <div class="stat-progress-container hidden" id="container-expiry">
                    <div class="stat-progress-bar" id="progress-expiry" style="--progress: 100%"></div>
                </div>
            </div>

            <div class="stat-card">
                <div class="stat-header">
                    <div class="stat-icon">⚡</div>
                    <div class="stat-info">
                        <span class="stat-label">Hız</span>
                        <span class="stat-value" id="stat-speed">Sınırsız</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ─── SETTINGS PANEL ────────────────────────────────────────── -->
    <div class="settings-panel hidden" id="settings-panel">
        <div class="settings-header">
            <button class="btn-back" id="btn-settings-back">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <h2 class="settings-title">Ayarlar</h2>
        </div>
        <div class="settings-body">

            <div class="settings-group">
                <label class="settings-label">Uygulama Sürümü</label>
                <span class="settings-value" id="settings-version">1.0.0</span>
            </div>
            <button class="btn-logout" id="btn-logout">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                Çıkış Yap
            </button>
        </div>
    </div>

    <!-- ─── TOAST CONTAINER ───────────────────────────────────────── -->
    <div class="toast-container" id="toast-container"></div>

    <script src="app.js"></script>
</body>
</html>
